name: Push artifact to S3
description: Push artifact to S3
inputs:
  project:
    description: Project name
    required: true
  branch:
    description: Branch name
    required: true
  s3-bucket:
    description: S3 bucket name
    required: true
  build-latest-tag:
    description: Need to build latest tag ot not
    required: false
    default: "true"
outputs:
  artifact:
    description: S3 path of artifact
    value: ${{ steps.get-artifact.outputs.artifact }}
runs:
  using: composite
  steps:
    - run: |
        if [ ${{ startsWith(inputs.branch, 'v') }} == true ]; then
          prefix="release"
          tag=$(echo "${{ inputs.branch }}" | sed "s|^v|""|")
          buildLatestTag=true
        else
          prefix="dev"
          tag="${{ inputs.branch }}"
          buildLatestTag=false
        fi

        s3Url="s3://${{ inputs.s3-bucket }}/$prefix/${{ inputs.project }}"
        outputFile="/tmp/$tag.tgz"

        tar --exclude=.git -czf $outputFile ./

        aws s3 cp $outputFile $s3Url/$tag.tgz

        if [ ${{ inputs.build-latest-tag }} == true ] && [ $buildLatestTag == true ]; then
          aws s3 cp $outputFile $s3Url/latest.tgz
        fi
      shell: bash
