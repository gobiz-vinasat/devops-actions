name: Deploy SST
description: Deploy SST
inputs:
  s3-source-code:
    description: S3 file path to source code
    required: true
  env-file:
    description: ENV file path
    required: true
  stage:
    description: Stage name
    required: true
  install:
    description: The scripts will be executed before deploy stage
runs:
  using: composite
  steps:
    - run: |
        rm -rf .app $tag.tgz
        mkdir .app
        cp ${{ inputs.env-file }} .app/.env
      shell: bash
      
    - run: cd .app && (${{ inputs.install }})
      shell: bash
      if: ${{ inputs.install }}
      
